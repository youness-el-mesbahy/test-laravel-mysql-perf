[www]
; Dynamic process management — spawns children on demand up to max_children.
; For 2vCPU / 4GB RAM:
;   ~25 MB per idle child → 30 children × 25 MB = 750 MB for PHP
;   Leaves ~3 GB for MySQL InnoDB buffer pool + OS
pm = dynamic
pm.max_children = 30
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Request termination
request_terminate_timeout = 30

; Set to production value — no debug overhead
php_value[display_errors] = 0
php_value[log_errors] = 1
